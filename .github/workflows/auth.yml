name: 1. Autenticar WhatsApp (Gerar Sessao)

on:
  workflow_dispatch: # Permite rodar este fluxo manualmente pelo painel do GitHub

jobs:
  auth:
    runs-on: ubuntu-22.04
    
    steps:
      - name: 1. Checkout do Repositório
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 3. Instalar Dependências WWebJS
        # Instala as libs de chrome e os pacotes npm na pasta raiz
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libnss3 libasound2 libatk-bridge2.0-0 libgtk-3-0
          npm init -y
          npm install whatsapp-web.js qrcode-terminal mongoose puppeteer @supabase/supabase-js dotenv

      - name: 4. Rodar Script de Autenticação (Ler QR Code)
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node whatsapp_auth.js
