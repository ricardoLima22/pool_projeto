  <body>
    <div id="root">
      <style>
        .splash-loader {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background: linear-gradient(135deg, hsl(225, 72%, 45%), hsl(225, 100%, 57%));
          font-family: system-ui, -apple-system, sans-serif;
          overflow: hidden;
        }
        .splash-logo-ring {
          width: 80px;
          height: 80px;
          border-radius: 50%;
          border: 4px solid rgba(255,255,255,0.15);
          border-top-color: #fff;
          animation: spin 1s linear infinite;
          margin-bottom: 32px;
        }
        .splash-icon {
          width: 48px;
          height: 48px;
          margin-bottom: 24px;
          animation: pulse-icon 2s ease-in-out infinite;
        }
        .splash-title {
          color: #fff;
          font-size: 1.5rem;
          font-weight: 700;
          letter-spacing: 0.05em;
          margin-bottom: 8px;
        }
        .splash-subtitle {
          color: rgba(255,255,255,0.6);
          font-size: 0.875rem;
          letter-spacing: 0.1em;
          text-transform: uppercase;
        }
        .splash-dots span {
          display: inline-block;
          width: 8px;
          height: 8px;
          margin: 24px 4px 0;
          border-radius: 50%;
          background: rgba(255,255,255,0.4);
          animation: dot-bounce 1.4s ease-in-out infinite;
        }
        .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
        .splash-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse-icon { 0%,100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }
        @keyframes dot-bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
      </style>
      <div class="splash-loader">
        <div class="splash-logo-ring"></div>
        <div class="splash-title">Pool Manager</div>
        <div class="splash-subtitle">Carregando sistema</div>
        <div class="splash-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
